name: DMP 2026 Project Template
description: List a new project for Dedicated Mentoring Program (DMP) 2026
title: "[DMP 2026]: LMS AI Content, Assessment & Micro-Learning Engine"
labels: ["DMP 2026"]

body:
  - type: textarea
    id: ticket-description
    validations:
      required: true
    attributes:
      label: Ticket Contents
      value: |
        ## Description
        This project delivers a pluggable, open-source-first AI microservice platform for a multi-tenant SaaS LMS. It automates the full educational content lifecycle from raw asset ingestion (PDF, PPT, Video, Audio) to publishable interactive micro-learning experiences.

        The platform runs entirely on self-hosted, locally-deployed open-source language models (Llama 3, Mistral, Whisper) with no hard dependency on external cloud AI APIs. Output formats are aligned to open LMS standards: HTML5, H5P, and SCORM — renderable on any LMS without proprietary infrastructure.

        The platform is structured around four modules:
        Module A — Intelligent Document Ingestion (PDF / PPT)
        Module B — Automated Assessment Suite (Quiz-Gen)
        Module C — Multimedia Intelligence (Video / Audio)
        Module D — AI Micro-Learning Studio (HTML5 / H5P / SCORM)

  - type: textarea
    id: ticket-goals
    validations:
      required: true
    attributes:
      label: Goals & Mid-Point Milestone
      description: List the goals of the feature. Please add the goals that must be achieved by Mid-point check-in i.e 1.5 months into the coding period.
      value: |
        ## Goals
        - [ ] Module A: PDF/PPT parser producing structured JSON, Key Takeaways, Glossary, and narration scripts — all via local LLM.
        - [ ] Module B: MCQ, Match-the-Pair, Fill-in-the-Blanks question generator + H5P/SCORM quiz packaging — local LLM as primary engine.
        - [ ] Module C: Local Whisper transcription, speaker diarisation, auto-chaptering, H5P Interactive Video with inline knowledge checks.
        - [ ] Module D: HTML5/H5P/SCORM micro-lesson generator from any source asset, with tenant branding and HITL review gate.
        - [ ] Goals Achieved By Mid-point Milestone (Week 6)

        Mid-point Milestone:
        - Module A fully operational: ingestion, summarisation, glossary, scripting.
        - Module B: MCQ + H5P Question Set packaging working end-to-end.
        - Module C: Whisper transcription + VTT output working.
        - LLM Gateway (Ollama) live with fallback configuration.
        - Async queue (Redis/Celery) operational.

  - type: textarea
    id: ticket-setup
    attributes:
      label: Setup/Installation
      description: Please list or link setup or installation guide (if any)
      value: |
        Prerequisites: Docker, Docker Compose, Node.js 20+, Python 3.11+

        1. Clone the repository and run: docker compose up -d
        2. Ollama service starts automatically and pulls Llama 3 8B and Mistral 7B models.
        3. Whisper large-v3 is downloaded on first transcription request.
        4. Access the API gateway at http://localhost:8000
        5. Access the micro-lesson builder UI at http://localhost:3000

        Refer to /docs/setup.md in the repository for full environment configuration, tenant setup, and model selection options.

  - type: textarea
    id: ticket-expected-outcome
    attributes:
      label: Expected Outcome
      description: Describe in detail what the final product or result should look like and how it should behave.
      value: |
        1. Fully functional 4-module AI platform deployable on-premise or on any cloud provider.
        2. Course creators can ingest a PDF/PPT and produce a structured H5P micro-lesson in under 10 minutes.
        3. All AI inference runs on locally-hosted open-source models — no external API dependency by default.
        4. Automated quiz generation (MCQ, Fill-in-the-Blanks, Match-the-Pair) packaged as H5P and SCORM packages.
        5. Video/audio assets transcribed locally (Whisper), chaptered, and packaged as H5P Interactive Video.
        6. All published content meets WCAG 2.1 AA accessibility standards.
        7. xAPI tracking for all learner interactions surfaced in the LMS dashboard.

  - type: textarea
    id: ticket-acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the acceptance criteria for this feature.
      value: |
        Module A
        - PDF and PPT files parsed into structured JSON with headers, body, images, metadata.
        - Key Takeaways and Glossary generated by local LLM (Llama 3 / Mistral).
        - Narration script generated from PPT speaker notes.
        - Processing time: ≤ 30 seconds for a 50-page document.

        Module B
        - MCQ, Match-the-Pair, Fill-in-the-Blanks generated strictly from source material (no hallucinations).
        - All question types packaged as valid H5P Question Set and SCORM 1.2 packages.
        - SCORM packages import successfully into Moodle 4.x and Open edX.
        - LaTeX STEM questions render correctly via MathJax.

        Module C
        - Video/audio transcribed with Whisper (local) — output: VTT + plain-text transcript.
        - Speaker diarisation labels in transcript.
        - Auto-generated timestamped chapter markers embedded in HTML5 navigation overlay.
        - H5P Interactive Video package with inline knowledge checks generated and importable.

        Module D
        - Micro-lesson generated from PDF, PPT, transcript, or free-form input.
        - Output formats: H5P Course Presentation, HTML5 slide deck, SCORM 1.2 package.
        - Tenant branding (logo, palette, font) applied automatically.
        - HITL review gate — no content published without creator approval.
        - xAPI statements emitted for start, progress, completion, quiz score.
        - Micro-lesson generation time: ≤ 2 minutes end-to-end.

  - type: textarea
    id: ticket-implementation-details
    validations:
      required: true
    attributes:
      label: Implementation Details
      description: List any technical details about the proposed implementation, including any specific technologies that will be used.
      value: |
        Architecture: Microservices (Docker Compose / Kubernetes)

        Services:
        - Ingestion Service: Python · PyMuPDF · python-pptx
        - LLM Gateway: Python · FastAPI · Ollama API (local-first, cloud fallback)
        - Assessment Service: Python · h5p-nodejs-library · pipwerks SCORM
        - Multimedia Service: Python · Whisper · pyannote-audio
        - Micro-Lesson Builder: Node.js · Reveal.js · h5p-cli
        - Queue & Worker: Redis · Celery / BullMQ
        - Tenant Config Service: PostgreSQL · REST API

        AI Model Stack:
        - Text Generation: Llama 3 8B (Ollama) — cloud fallback: GPT-4o (optional)
        - Transcription: Whisper large-v3 (fully local)
        - Embeddings / RAG: nomic-embed-text (Ollama)
        - Diagram Generation: Mermaid.js (browser-side, no LLM)

        Output Standards: H5P Core 1.24+, SCORM 1.2 / 2004, HTML5, xAPI 1.0, VTT/SRT

  - type: textarea
    id: ticket-mockups
    attributes:
      label: Mockups/Wireframes
      description: Include links to any visual aids, mockups, wireframes, or diagrams that help illustrate what the final product should look like. This is not always necessary, but can be very helpful in many cases.
      value: |
        To be shared — Micro-Lesson Builder UI wireframes in progress.

  - type: input
    id: ticket-product
    attributes:
      label: Product Name
      placeholder: Enter Product Name
      value: LMS AI Content, Assessment & Micro-Learning Engine
    validations:
      required: true

  - type: dropdown
    id: ticket-organisation
    attributes:
      label: Organisation Name
      description: Enter Organisation Name
      multiple: false
      options:
        - Tekdi Technologies Pvt. Ltd.
    validations:
      required: true

  - type: dropdown
    id: ticket-governance-domain
    attributes:
      label: Domain
      options:
        - Education
    validations:
      required: true

  - type: dropdown
    id: ticket-technical-skills-required
    attributes:
      label: Tech Skills Needed
      description: Select the technologies needed for this ticket (use Ctrl or Command to select multiple)
      multiple: true
      options:
        - Python
        - Node.js
        - FastAPI
        - React
        - Docker
        - PostgreSQL
        - Artificial Intelligence
        - Machine Learning
    validations:
      required: true

  - type: textarea
    id: ticket-mentors
    attributes:
      label: Mentor(s)
      description: Please tag relevant mentors for the ticket
      value: |
        siddhi shinde, Dnyanesh Kulkarni
    validations:
      required: true

  - type: dropdown
    id: ticket-category
    attributes:
      label: Category
      description: Choose the categories that best describe your ticket
      multiple: true
      options:
        - AI
        - Backend
        - Frontend
        - Documentation
        - Research
    validations:
      required: true